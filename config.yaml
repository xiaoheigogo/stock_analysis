# 股票预测系统配置

# 数据库配置
database:
  postgres:
    host: "localhost"
    port: 5432
    database: "stock"  # 改为postgres数据库
    user: "postgres"
    password: "123456"  # 请在生产环境中修改
    minconn: 1
    maxconn: 50

  mysql:
    host: "localhost"
    port: 3306
    database: "stock_prediction"
    user: "root"
    password: "admin"  # 请在生产环境中修改

# 数据配置
data:
  # 特征列配置
  feature_columns:
    raw_features:
      - "open_raw"
      - "high_raw"
      - "low_raw"
      - "close_raw"
      - "volumn_raw"
      - "amount_raw"
      - "amplitude_raw"
      - "pct_change_raw"
      - "change_raw"
      - "turnover_raw"

    clean_features:
      - "open_clean"
      - "high_clean"
      - "low_clean"
      - "close_clean"
      - "volumn_clean"
      - "amount_clean"
      - "amplitude_clean"
      - "pct_change_clean"
      - "change_clean"
      - "turnover_clean"

    technical_indicators:
      - "ma5"
      - "ma10"
      - "macd_dif"
      - "rsi14"

    time_features:
      - "month_sin"
      - "month_cos"
      - "day_sin"
      - "day_cos"
      - "dow_sin"
      - "dow_cos"

  # 默认股票代码（用于测试）
  default_stocks:
    - "000001"  # 平安银行
    - "000002"  # 万科A
    - "000003"  # PT金田A
    - "000004"  # 国农科技
    - "000005"  # 世纪星源

# 模型训练配置
model:
  # 默认模型参数
  lstm:
    input_dim: 20
    hidden_dim: 128
    num_layers: 1
    dropout: 0.2
    bidirectional: false

  gru:
    input_dim: 20
    hidden_dim: 128
    num_layers: 1
    dropout: 0.2
    bidirectional: false

  cnn_lstm:
    input_dim: 20
    cnn_channels: 32
    lstm_hidden: 128
    dropout: 0.2

  transformer:
    input_dim: 20
    d_model: 128
    nhead: 8
    num_layers: 2
    dropout: 0.2

  # 训练参数
  training:
    seq_len: 30
    pred_len: 10
    batch_size: 32
    epochs: 50
    learning_rate: 0.001
    train_ratio: 0.8
    loss_function: "mse"
    optimizer: "adam"
    weight_decay: 0.0001

# 路径配置
paths:
  output_dir: "./output"
  model_dir: "./output/models"
  log_dir: "./output/logs"
  data_dir: "./data"
  scaler_path: "./data_process/scaler_X.pkl"

# API配置（如果使用）
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  workers: 4

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
  datefmt: "%H:%M:%S"

  # 文件日志
  file_logging: true
  log_dir: "./logs"
  max_size_mb: 100
  backup_count: 30

# 代理配置（用于数据获取）
proxy:
  enabled: true
  http_proxy: "http://127.0.0.1:7897"
  https_proxy: "http://127.0.0.1:7897"

# 时间配置
time:
  # 数据更新时间（收盘后）
  data_update_hour: 17
  data_update_minute: 0

  # 时区
  timezone: "Asia/Shanghai"

# 云服务配置（阿里云PAI）
cloud:
  pai:
    # OSS配置
    oss:
      endpoint: ""
      bucket: ""
      access_key_id: ""
      access_key_secret: ""

    # DLC训练配置
    dlc:
      instance_type: "ecs.gn6i-c4g1.xlarge"
      image_uri: ""
      command: "python train.py"

    # EAS推理配置
    eas:
      instance_type: "ecs.gn6i-c4g1.xlarge"
      instance_count: 1

# 安全配置
security:
  # API密钥（用于外部接口）
  api_keys: []

  # CORS配置
  cors:
    origins: ["http://localhost:3000"]
    methods: ["GET", "POST", "PUT", "DELETE"]
    headers: ["*"]